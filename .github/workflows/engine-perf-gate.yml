name: Benchmark Budget Gate

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - "scripts/bench/**"
      - "benches/budgets/**"
      - ".github/workflows/engine-perf-gate.yml"

jobs:
  benchmark-budget-gate:
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run benchmark budget verification
        run: scripts/bench/verify.sh --platform macos-15
      - name: Upload benchmark metrics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-metrics
          path: target/bench/latest/metrics.json
          if-no-files-found: ignore
