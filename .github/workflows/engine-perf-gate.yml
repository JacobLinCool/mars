name: Engine Perf Gate

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/mars-engine/**"
      - "crates/mars-graph/**"
      - "crates/mars-types/**"
      - ".github/workflows/engine-perf-gate.yml"

jobs:
  engine-soak-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run mars-engine tests (includes soak/concurrency integration tests)
        run: cargo test -p mars-engine

  engine-perf-gate:
    needs: engine-soak-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run release perf regression gate
        run: cargo test -p mars-engine --release --test perf_gate -- --ignored
